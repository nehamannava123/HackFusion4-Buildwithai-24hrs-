<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeNav AI</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0f12;
      --surface: #151820;
      --surface2: #1c2030;
      --border: #2a2f3d;
      --accent: #4fffb0;
      --accent2: #4fa8ff;
      --text: #e8eaf0;
      --muted: #6b7280;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
    }

    /* grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 3rem;
      animation: fadeUp .5s ease both;
    }
    .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      color: #0d0f12;
      font-weight: 500;
    }
    .header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header h1 span { color: var(--accent); }
    .badge {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      animation: fadeUp .5s ease both;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── Form ── */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    input[type="text"], select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"] { flex: 1; }
    input[type="text"]:focus, select:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    select {
      cursor: pointer;
      min-width: 140px;
    }
    select option { background: var(--surface2); }

    .btn {
      background: var(--accent);
      color: #0d0f12;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      white-space: nowrap;
    }
    .btn:hover { opacity: .85; }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); opacity: 1; }

    /* ── Level tabs ── */
    .level-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .level-tab {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 12px;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      transition: all .15s;
    }
    .level-tab.active {
      background: var(--accent);
      color: #0d0f12;
      border-color: var(--accent);
      font-weight: 600;
    }

    /* ── Loading ── */
    .loader {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      font-size: 13px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    .loader.show { display: flex; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    /* ── Results ── */
    .results { display: none; }
    .results.show { display: block; }

    .result-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 1rem;
      overflow: hidden;
      animation: fadeUp .4s ease both;
    }
    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .result-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .result-dot.blue { background: var(--accent2); }
    .result-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .result-body {
      padding: 16px;
      font-size: 14px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      font-family: 'DM Mono', monospace;
    }

    /* Flow steps */
    .flow-step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .flow-step:last-child { border-bottom: none; }
    .step-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .step-text {
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      line-height: 1.5;
    }

    /* Structure tags */
    .tags { display: flex; flex-wrap: wrap; gap: 6px; padding: 16px; }
    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid;
    }
    .tag-green { color: var(--accent); border-color: var(--accent); background: rgba(79,255,176,.07); }
    .tag-blue { color: var(--accent2); border-color: var(--accent2); background: rgba(79,168,255,.07); }
    .tag-yellow { color: #ffd166; border-color: #ffd166; background: rgba(255,209,102,.07); }

    /* ── Q&A ── */
    .qa-section { margin-top: 1rem; }
    .qa-log {
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .qa-msg {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.6;
      max-width: 90%;
    }
    .qa-msg.user {
      background: var(--surface2);
      border: 1px solid var(--border);
      align-self: flex-end;
      font-family: 'Syne', sans-serif;
      color: var(--accent2);
    }
    .qa-msg.ai {
      background: var(--surface);
      border: 1px solid var(--border);
      align-self: flex-start;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      white-space: pre-wrap;
    }
    .qa-row {
      display: flex;
      gap: 8px;
    }
    .qa-row input { flex: 1; }

    /* ── Error ── */
    .error-box {
      display: none;
      background: rgba(255,107,107,.08);
      border: 1px solid var(--danger);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--danger);
      font-family: 'DM Mono', monospace;
      margin-top: 10px;
    }
    .error-box.show { display: block; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="logo">&lt;/&gt;</div>
    <h1>Code<span>Nav</span> AI</h1>
    <span class="badge">v1.0 · hackathon</span>
  </div>

  <!-- Analyze Card -->
  <div class="card" style="animation-delay:.05s">
    <div class="card-title">Analyze a GitHub Repository</div>

    <div class="level-tabs">
      <button class="level-tab active" onclick="setLevel('beginner', this)">Beginner</button>
      <button class="level-tab" onclick="setLevel('intermediate', this)">Intermediate</button>
      <button class="level-tab" onclick="setLevel('advanced', this)">Advanced</button>
    </div>

    <div class="input-row">
      <input type="text" id="repoUrl"
        placeholder="https://github.com/username/repository" />
      <button class="btn" onclick="analyzeRepo()" id="analyzeBtn">Analyze →</button>
    </div>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <span id="loaderText">Parsing repository...</span>
    </div>

    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- Results -->
  <div class="results" id="results">

    <!-- Detected Structure -->
    <div class="result-section">
      <div class="result-header">
        <div class="result-dot blue"></div>
        <span class="result-label">Detected Structure</span>
      </div>
      <div id="structureTags" class="tags"></div>
    </div>

    <!-- Explanation -->
    <div class="result-section">
      <div class="result-header">
        <div class="result-dot"></div>
        <span class="result-label">AI Explanation</span>
      </div>
      <div class="result-body" id="explanation"></div>
    </div>

    <!-- Flow Steps -->
    <div class="result-section">
      <div class="result-header">
        <div class="result-dot blue"></div>
        <span class="result-label">Execution Flow</span>
      </div>
      <div id="flowSteps" style="padding: 8px 16px;"></div>
    </div>

    <!-- Q&A -->
    <div class="card qa-section" style="animation-delay:.1s">
      <div class="card-title">Ask a Question</div>
      <div class="qa-log" id="qaLog"></div>
      <div class="qa-row">
        <input type="text" id="qaInput"
          placeholder="How does login work? What does AuthService do?"
          onkeydown="if(event.key==='Enter') askQuestion()" />
        <button class="btn btn-secondary" onclick="askQuestion()" id="askBtn">Ask</button>
      </div>
    </div>

  </div>

</div>

<script>
  // ── Config ──────────────────────────────────────
  // Point this to your Spring Boot backend
  const BACKEND_URL = 'http://localhost:8080/api';

  let currentLevel = 'beginner';
  let currentRepoUrl = '';

  // ── Level selector ──────────────────────────────
  function setLevel(level, btn) {
    currentLevel = level;
    document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }

  // ── Analyze repo ────────────────────────────────
  async function analyzeRepo() {
    const repoUrl = document.getElementById('repoUrl').value.trim();
    if (!repoUrl) return showError('Please enter a GitHub repository URL.');

    currentRepoUrl = repoUrl;

    setLoading(true, 'Fetching repository structure...');
    hideError();
    hideResults();

    try {
      const res = await fetch(`${BACKEND_URL}/analyze`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ repoUrl, level: currentLevel })
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        throw new Error(data.error || 'Analysis failed');
      }

      renderResults(data);

    } catch (err) {
      showError(err.message || 'Could not connect to backend. Make sure Spring Boot is running on port 8080.');
    } finally {
      setLoading(false);
    }
  }

  // ── Ask question ────────────────────────────────
  async function askQuestion() {
    const question = document.getElementById('qaInput').value.trim();
    if (!question) return;
    if (!currentRepoUrl) return showError('Please analyze a repository first.');

    addQaMessage(question, 'user');
    document.getElementById('qaInput').value = '';
    document.getElementById('askBtn').disabled = true;

    try {
      const res = await fetch(`${BACKEND_URL}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question,
          repoUrl: currentRepoUrl,
          level: currentLevel
        })
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        throw new Error(data.error || 'Could not get answer');
      }

      addQaMessage(data.answer, 'ai');

    } catch (err) {
      addQaMessage('Error: ' + err.message, 'ai');
    } finally {
      document.getElementById('askBtn').disabled = false;
    }
  }

  // ── Render results ──────────────────────────────
  function renderResults(data) {
    // Structure tags
    const structure = data.parsedStructure || {};
    const tagsEl = document.getElementById('structureTags');
    tagsEl.innerHTML = '';

    if (structure.entryPoint) {
      tagsEl.innerHTML += `<span class="tag tag-green">▶ ${structure.entryPoint}</span>`;
    }
    (structure.controllers || []).forEach(c =>
      tagsEl.innerHTML += `<span class="tag tag-blue">C: ${c}</span>`);
    (structure.services || []).forEach(s =>
      tagsEl.innerHTML += `<span class="tag tag-green">S: ${s}</span>`);
    (structure.repositories || []).forEach(r =>
      tagsEl.innerHTML += `<span class="tag tag-yellow">R: ${r}</span>`);

    // Explanation
    document.getElementById('explanation').textContent =
      data.explanation || 'No explanation available.';

    // Flow steps
    const flowEl = document.getElementById('flowSteps');
    flowEl.innerHTML = '';
    const steps = data.flowSteps || [];
    if (steps.length === 0) {
      flowEl.innerHTML = '<p style="padding:8px;color:var(--muted);font-size:13px;font-family:var(--dm-mono)">No flow data available.</p>';
    } else {
      steps.forEach((step, i) => {
        flowEl.innerHTML += `
          <div class="flow-step">
            <div class="step-num">${i + 1}</div>
            <div class="step-text">${step.replace(/^Step \d+:\s*/, '')}</div>
          </div>`;
      });
    }

    showResults();
  }

  // ── Q&A log ─────────────────────────────────────
  function addQaMessage(text, type) {
    const log = document.getElementById('qaLog');
    const msg = document.createElement('div');
    msg.className = `qa-msg ${type}`;
    msg.textContent = text;
    log.appendChild(msg);
    log.scrollTop = log.scrollHeight;
  }

  // ── UI helpers ───────────────────────────────────
  function setLoading(on, text) {
    const loader = document.getElementById('loader');
    const btn = document.getElementById('analyzeBtn');
    if (on) {
      loader.classList.add('show');
      if (text) document.getElementById('loaderText').textContent = text;
      btn.disabled = true;
    } else {
      loader.classList.remove('show');
      btn.disabled = false;
    }
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = '⚠ ' + msg;
    box.classList.add('show');
  }

  function hideError() {
    document.getElementById('errorBox').classList.remove('show');
  }

  function showResults() {
    document.getElementById('results').classList.add('show');
  }

  function hideResults() {
    document.getElementById('results').classList.remove('show');
  }
</script>
</body>
</html>
